[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memgar"
version = "0.1.0"
description = "AI Agent Memory Security - Protect against memory poisoning attacks"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Memgar", email = "hello@memgar.io" }
]
keywords = [
    "ai", "security", "llm", "memory", "prompt-injection",
    "agent", "langchain", "claude", "gpt", "mcp", "poisoning"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "click>=8.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]
cloud = [
    "anthropic>=0.18.0",
    "httpx>=0.25.0",
]
langchain = [
    "langchain>=0.1.0",
    "langchain-core>=0.1.0",
]
all = [
    "memgar[dev,cloud,langchain]",
]

[project.scripts]
memgar = "memgar.cli:main"

[project.urls]
Homepage = "https://memgar.io"
Documentation = "https://docs.memgar.io"
Repository = "https://github.com/memgar/memgar"
Issues = "https://github.com/memgar/memgar/issues"

[tool.hatch.build.targets.wheel]
packages = ["memgar"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "W", "B", "Q"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
