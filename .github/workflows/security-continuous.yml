name: Continuous Security

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  security-regression:
    name: Security regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,graph,gateway,feed]" numpy scikit-learn

      - name: Rebuild model artifact
        run: python rebuild_model.py

      - name: Run security-focused test suites
        run: |
          python -m pytest -q \
            tests/test_security_hardening.py \
            tests/test_security_deep.py \
            tests/test_gateway.py \
            tests/test_policy_engine.py \
            tests/test_memory_vault.py \
            tests/test_runtime.py \
            tests/test_secure_memory_store.py \
            tests/test_canary_and_tool_guard.py \
            tests/test_langchain_memory_firewall.py

  red-team-offline:
    name: Scheduled offline red-team
    runs-on: ubuntu-latest
    needs: security-regression
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,graph]" numpy scikit-learn

      - name: Rebuild model artifact
        run: python rebuild_model.py

      - name: Run offline adversarial red-team sweep
        run: |
          python scripts/red_team_run.py \
            --n-seeds 12 \
            --n-variants 6 \
            --offline \
            --dry-run \
            | tee red_team_report_continuous.json

      - name: Upload red-team report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: continuous-red-team-${{ github.run_id }}
          path: red_team_report_continuous.json
          if-no-files-found: warn

  notify-on-failure:
    name: Security alert on failure
    runs-on: ubuntu-latest
    needs:
      - security-regression
      - red-team-offline
    if: failure()

    steps:
      - name: Emit failure summary
        run: |
          echo "::error::Continuous security workflow failed"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send webhook alert (optional)
        if: ${{ secrets.MEMGAR_SECURITY_ALERT_WEBHOOK != '' }}
        env:
          MEMGAR_SECURITY_ALERT_WEBHOOK: ${{ secrets.MEMGAR_SECURITY_ALERT_WEBHOOK }}
        run: |
          curl -sS -X POST "$MEMGAR_SECURITY_ALERT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"service":"memgar","workflow":"continuous-security","status":"failed","run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
