name: Publish Threat Feed

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      feed_version:
        description: "Feed version (e.g. 1.2.3) — defaults to GitHub release tag"
        required: false

jobs:
  publish-feed:
    name: Sign and publish feed bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[feed]"

      - name: Write private key from secret
        run: |
          install -m 600 /dev/null /tmp/feed_private.pem
          echo "${{ secrets.FEED_PRIVATE_KEY }}" > /tmp/feed_private.pem

      - name: Determine and validate feed version
        id: version
        run: |
          # Always compute from a shell variable — never interpolate user input directly
          # into a shell expression to prevent script injection.
          INPUT_VERSION="${{ github.event.inputs.feed_version }}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ -n "$INPUT_VERSION" ]; then
            CANDIDATE="$INPUT_VERSION"
          else
            CANDIDATE="$TAG_VERSION"
          fi

          # Strict semver validation — reject anything that isn't X.Y.Z
          if ! echo "$CANDIDATE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: feed_version '$CANDIDATE' is not a valid semver (X.Y.Z)"
            exit 1
          fi

          echo "feed_version=$CANDIDATE" >> "$GITHUB_OUTPUT"

      - name: Sign and package feed bundle
        env:
          FEED_VERSION: ${{ steps.version.outputs.feed_version }}
        run: |
          python scripts/publish_feed.py \
            --private-key-file /tmp/feed_private.pem \
            --output-dir feeds/ \
            --feed-version "$FEED_VERSION" \
            --min-memgar-version "0.5.0"

      - name: Commit feeds/ to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update signed feed bundle v${{ steps.version.outputs.feed_version }}"
          file_pattern: "feeds/memgar-feed.json.gz"
          branch: main

      - name: Upload feed bundle to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: feeds/memgar-feed.json.gz
