name: Publish Threat Feed

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      feed_version:
        description: "Feed version (e.g. 1.2.3) — defaults to GitHub release tag"
        required: false

jobs:
  publish-feed:
    name: Sign and publish feed bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[feed]"

      - name: Write private key from secret
        run: |
          echo "${{ secrets.FEED_PRIVATE_KEY }}" > /tmp/feed_private.pem
          chmod 600 /tmp/feed_private.pem

      - name: Determine feed version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.feed_version }}" ]; then
            echo "feed_version=${{ github.event.inputs.feed_version }}" >> $GITHUB_OUTPUT
          else
            # Strip leading 'v' from tag name (e.g. v1.2.3 → 1.2.3)
            echo "feed_version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Sign and package feed bundle
        run: |
          python scripts/publish_feed.py \
            --private-key-file /tmp/feed_private.pem \
            --output-dir feeds/ \
            --feed-version "${{ steps.version.outputs.feed_version }}" \
            --min-memgar-version "0.5.0"

      - name: Commit dist/ to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update signed feed bundle v${{ steps.version.outputs.feed_version }}"
          file_pattern: "feeds/memgar-feed.json.gz"
          branch: main

      - name: Upload feed bundle to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: feeds/memgar-feed.json.gz
