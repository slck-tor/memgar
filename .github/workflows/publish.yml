name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

  # Manual trigger for emergency releases
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Run full test suite before publishing
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Pre-publish Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install numpy scikit-learn

      - name: Build model
        run: python scripts/build_model.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests
        run: pytest --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ─────────────────────────────────────────────────────────────────────────
  # Build distribution packages
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build hatchling twine

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to TestPyPI first (dry run)
  # ─────────────────────────────────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    if: github.event_name == 'push' || inputs.environment == 'testpypi'

    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to real PyPI (requires manual approval in GitHub environment)
  # ─────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: [build, publish-testpypi]
    environment: pypi  # requires approval in GitHub repo settings
    if: github.event_name == 'push' || inputs.environment == 'pypi'

    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with changelog
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Extract section between this version and the next header
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "memgar v${{ needs.build.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, 'rc') || contains(needs.build.outputs.version, 'beta') || contains(needs.build.outputs.version, 'alpha') }}
